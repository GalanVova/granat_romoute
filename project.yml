name: GranatRemote
options:
  bundleIdPrefix: com.granat
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_BUNDLE_IDENTIFIER: com.granat.remote
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  GranatRemote:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GranatRemote
    settings:
      base:
        INFOPLIST_FILE: GranatRemote/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.granat.remote
